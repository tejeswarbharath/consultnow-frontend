<div class="flex flex-col h-screen bg-[var(--b1)] font-sans text-[var(--bc)]">
  <!-- Header -->
  <header class="bg-[var(--b2)] border-b border-[var(--b3)] px-6 py-4 flex justify-between items-center shadow-md z-10">
    <div class="flex items-center space-x-4">
      <div class="relative">
        <div class="w-12 h-12 bg-blue-500/10 border border-blue-500/35 rounded-full flex items-center justify-center text-blue-400 font-bold text-xl">
          {{ expertName.charAt(0) }}
        </div>
        <!-- Status indicator -->
        <span 
          class="absolute bottom-0 right-0 w-3.5 h-3.5 border-2 border-[var(--b2)] rounded-full shadow"
          [ngClass]="{
            'bg-emerald-500': expertStatus === 'available',
            'bg-amber-500': expertStatus === 'busy',
            'bg-slate-500': expertStatus === 'offline'
          }"
          title="{{ expertStatus }}">
        </span>
      </div>
      <div>
        <h2 class="text-lg font-bold text-white leading-tight">{{ expertName }}</h2>
        <p class="text-xs text-[var(--bc)]/60 capitalize mt-0.5">{{ expertStatus }}</p>
      </div>
    </div>
    
    <div class="flex items-center space-x-2 bg-blue-500/10 px-4 py-2 rounded-xl border border-blue-500/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="font-mono text-base font-extrabold text-blue-400">
        {{ remainingSeconds !== null ? formatTime(remainingSeconds) : '--:--' }}
      </span>
    </div>
  </header>

  <!-- Chat Messages Area -->
  <main class="flex-1 overflow-y-auto p-6 space-y-4">
    <div class="flex flex-col space-y-4 max-w-4xl mx-auto w-full">
      
      <div *ngIf="messages.length === 0" class="text-center text-[var(--bc)]/40 py-20 bg-slate-950/10 rounded-2xl border border-[var(--b3)] border-dashed">
        <p class="text-sm">No messages yet. Send a message to start the consultation!</p>
      </div>

      <div *ngFor="let msg of messages" 
           class="flex w-full"
           [ngClass]="{'justify-end': msg.senderId === currentUserId, 'justify-start': msg.senderId !== currentUserId}">
        
        <div class="max-w-[75%] rounded-2xl px-5 py-3 shadow-md relative leading-relaxed"
             [ngClass]="{
               'bg-blue-600/20 border border-blue-500/30 text-white rounded-br-none': msg.senderId === currentUserId,
               'bg-[var(--b2)] text-[var(--bc)] border border-[var(--b3)] rounded-bl-none': msg.senderId !== currentUserId
             }">
          <div *ngIf="msg.senderId !== currentUserId" class="text-[10px] font-bold text-blue-400 uppercase tracking-wider mb-1">
            {{ msg.senderName }}
          </div>
          <p class="text-sm break-words">{{ msg.message }}</p>
          <span class="text-[9px] mt-1.5 block opacity-60 text-right font-medium">
            {{ msg.timestamp | date:'shortTime' }}
          </span>
        </div>
      </div>
    </div>
  </main>

  <!-- Input Area -->
  <footer class="bg-[var(--b2)] border-t border-[var(--b3)] p-4">
    <div class="max-w-4xl mx-auto w-full relative flex items-center">
      <input 
        type="text" 
        [(ngModel)]="newMessage" 
        (keyup.enter)="sendMessage()"
        placeholder="Type your message here..." 
        class="w-full bg-[#0a0f1d] border border-[var(--b3)] rounded-full pl-6 pr-14 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm text-white placeholder-slate-500 transition-all"
      />
      <button 
        (click)="sendMessage()"
        [disabled]="!newMessage.trim()"
        class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-md focus:outline-none cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-0.5 text-white" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
          <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
        </svg>
      </button>
    </div>
  </footer>
</div>
