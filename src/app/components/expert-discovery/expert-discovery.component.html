<div class="min-h-screen bg-gray-50 flex flex-col md:flex-row">
  <!-- Sidebar for Categories -->
  <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex-shrink-0">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Categories</h2>
    <ul class="space-y-2">
      <li>
        <button
          class="w-full text-left px-4 py-2 rounded-lg transition-colors"
          [class.bg-blue-50]="selectedCategoryId === ''"
          [class.text-blue-700]="selectedCategoryId === ''"
          [class.text-gray-600]="selectedCategoryId !== ''"
          [class.hover:bg-gray-100]="selectedCategoryId !== ''"
          (click)="onCategorySelect('')">
          All Experts
        </button>
      </li>
      <li *ngFor="let category of categories">
        <button
          class="w-full text-left px-4 py-2 rounded-lg transition-colors"
          [class.bg-blue-50]="selectedCategoryId === category.id"
          [class.text-blue-700]="selectedCategoryId === category.id"
          [class.text-gray-600]="selectedCategoryId !== category.id"
          [class.hover:bg-gray-100]="selectedCategoryId !== category.id"
          (click)="onCategorySelect(category.id)">
          {{ category.name }}
        </button>
      </li>
    </ul>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 p-6 md:p-10">
    <!-- Search Bar -->
    <div class="mb-8 max-w-2xl">
      <div class="relative">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          placeholder="Search by name or subject expertise..."
          class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm"
        />
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <button
          (click)="onSearch()"
          class="absolute inset-y-2 right-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded-lg transition-colors font-medium">
          Search
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && experts.length === 0" class="bg-white rounded-xl shadow-sm p-12 text-center border border-gray-200">
      <svg class="mx-auto h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      <h3 class="text-xl font-medium text-gray-900 mb-2">No experts found</h3>
      <p class="text-gray-500">Try adjusting your search or category filters.</p>
      <button (click)="onCategorySelect(''); searchQuery=''; onSearch()" class="mt-6 text-blue-600 hover:text-blue-800 font-medium">
        Clear all filters
      </button>
    </div>

    <!-- Expert Grid -->
    <div *ngIf="!loading && experts.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let expert of experts" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
        <div class="p-6 flex-1">
          <div class="flex items-start space-x-4">
            <img [src]="expert.photoUrl || 'https://ui-avatars.com/api/?name=' + expert.name + '&background=random'" alt="{{ expert.name }}" class="w-16 h-16 rounded-full object-cover shadow-sm border border-gray-100">
            <div>
              <h3 class="text-lg font-bold text-gray-900">{{ expert.name }}</h3>
              <p class="text-sm text-blue-600 font-medium">{{ expert.category?.name }}</p>
              <div class="flex items-center mt-1 text-sm text-gray-500">
                <svg class="h-4 w-4 mr-1 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                {{ expert.yearsExperience }} Years Exp.
              </div>
            </div>
          </div>
          
          <div class="mt-5">
            <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Expertise</h4>
            <div class="flex flex-wrap gap-2">
              <span *ngFor="let subject of expert.subjectExpertise" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                {{ subject }}
              </span>
            </div>
          </div>
        </div>
        
        <div class="bg-gray-50 p-6 border-t border-gray-100 flex items-center justify-between mt-auto">
          <div>
            <span class="text-2xl font-bold text-gray-900">${{ expert.pricePerHour }}</span>
            <span class="text-sm text-gray-500">/hour</span>
          </div>
          <button class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-xl transition-colors shadow-sm">
            Select Expert
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
