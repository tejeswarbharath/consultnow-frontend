<div class="bg-white rounded-lg shadow p-6 max-w-2xl mx-auto mt-8 border border-gray-200">
  <h2 class="text-2xl font-bold text-gray-800 mb-4">AI Marketing Generator</h2>
  <p class="text-gray-600 mb-6">
    Enter your raw skills and let our AI craft a professional bio and a catchy marketing snippet to help you stand out.
  </p>

  <form (ngSubmit)="generateMarketing()" class="mb-8">
    <div class="mb-4">
      <label for="skills" class="block text-sm font-medium text-gray-700 mb-1">Your Skills & Expertise</label>
      <textarea 
        id="skills" 
        name="rawSkills" 
        [(ngModel)]="rawSkills" 
        rows="4" 
        class="w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-blue-500 focus:border-blue-500"
        placeholder="e.g., 10 years experience in family law, contract negotiation, excellent communication skills..."></textarea>
    </div>
    
    <button 
      type="submit" 
      [disabled]="isLoading || !rawSkills.trim()"
      class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 transition-colors flex justify-center items-center">
      <span *ngIf="isLoading">
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Generating...
      </span>
      <span *ngIf="!isLoading">Generate Marketing Materials</span>
    </button>
  </form>

  <div *ngIf="error" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
    <p class="text-red-700">{{ error }}</p>
  </div>

  <div *ngIf="generatedBio || generatedSnippet" class="space-y-6">
    <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 relative group">
      <h3 class="text-lg font-semibold text-gray-800 mb-2">Professional Bio</h3>
      <p class="text-gray-700 whitespace-pre-wrap">{{ generatedBio }}</p>
      <button 
        (click)="copyToClipboard(generatedBio)"
        class="absolute top-4 right-4 text-gray-400 hover:text-blue-600 focus:outline-none"
        title="Copy to clipboard">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
      </button>
    </div>

    <div class="bg-blue-50 rounded-lg p-4 border border-blue-100 relative group">
      <h3 class="text-lg font-semibold text-blue-800 mb-2">Marketing Snippet</h3>
      <p class="text-blue-900 italic">"{{ generatedSnippet }}"</p>
      <button 
        (click)="copyToClipboard(generatedSnippet)"
        class="absolute top-4 right-4 text-blue-400 hover:text-blue-600 focus:outline-none"
        title="Copy to clipboard">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
      </button>
    </div>
  </div>
</div>
