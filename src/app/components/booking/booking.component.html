<div class="container mx-auto p-4 max-w-4xl animate-fade-in">
  <div *ngIf="isLoading" class="text-center py-10">
    <span class="loading loading-spinner loading-lg text-primary"></span>
  </div>

  <div *ngIf="!isLoading && expert">
    <div class="bg-base-100 shadow-xl rounded-2xl overflow-hidden mb-8 border border-base-200">
      <div class="md:flex">
        <div class="md:shrink-0 bg-base-200 p-6 flex justify-center items-center">
          <img [src]="expert.photoUrl || 'https://via.placeholder.com/150'" alt="Expert Photo" class="h-48 w-48 object-cover rounded-full shadow-lg border-4 border-white">
        </div>
        <div class="p-8">
          <div class="uppercase tracking-wide text-sm text-primary font-semibold">{{ expert.subjectExpertise }}</div>
          <h2 class="mt-1 text-3xl font-bold text-base-content">{{ expert.name }}</h2>
          <p class="mt-2 text-base-content/70 whitespace-pre-line">{{ expert.bio || expert.marketingSnippet || 'No bio provided.' }}</p>
          
          <div class="mt-4 flex flex-wrap gap-4 text-sm text-base-content/80">
            <div class="flex items-center">
              <span class="font-bold mr-2">Experience:</span> {{ expert.yearsExperience }} Years
            </div>
            <div class="flex items-center">
              <span class="font-bold mr-2">Rate:</span> 
              <span *ngIf="expert.currency === 'INR'">₹</span>
              <span *ngIf="expert.currency === 'USD'">$</span>
              {{ expert.pricePerHour }}/hr
            </div>
            <div class="flex items-center">
              <span class="font-bold mr-2">Status:</span> 
              <span class="badge badge-success gap-1" *ngIf="expert.isAvailable">Available</span>
              <span class="badge badge-error gap-1" *ngIf="!expert.isAvailable">Unavailable</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-base-100 shadow-xl rounded-2xl p-8 mb-8 border border-base-200">
      <h3 class="text-2xl font-bold mb-6">Book Your Consultation</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="form-control">
          <label class="label"><span class="label-text font-semibold">Your Name</span></label>
          <input type="text" [(ngModel)]="guestName" placeholder="John Doe" class="input input-bordered w-full" />
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text font-semibold">Your Email</span></label>
          <input type="email" [(ngModel)]="guestEmail" placeholder="john@example.com" class="input input-bordered w-full" />
        </div>
      </div>
      
      <div class="form-control mb-8">
        <label class="label"><span class="label-text font-semibold">Enter Your First Query / Problem Description</span></label>
        <textarea [(ngModel)]="problemDescription" class="textarea textarea-bordered h-32 w-full" placeholder="Describe what you need help with in detail..."></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <button 
          (click)="initiateCheckout()" 
          [disabled]="isProcessing || !expert.isAvailable" 
          class="btn btn-primary btn-lg w-full shadow-lg hover:-translate-y-1 transition-transform">
          <span *ngIf="isProcessing" class="loading loading-spinner"></span>
          {{ isProcessing ? 'Processing...' : 'Paid Service' }}
        </button>
        
        <button 
          (click)="bookFreeService()" 
          [disabled]="isProcessing || !expert.isAvailable" 
          class="btn btn-secondary btn-lg w-full shadow-lg hover:-translate-y-1 transition-transform">
          One Hour Free Service
        </button>
      </div>
    </div>
  </div>
</div>
