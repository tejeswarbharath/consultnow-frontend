<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">
        Register as an Expert
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">Join our professional consulting platform.</p>
    </div>
    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="rounded-md shadow-sm space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <input formControlName="name" type="text" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email Address</label>
          <input formControlName="email" type="email" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input formControlName="password" type="password" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Category / Expertise</label>
          <select formControlName="subjectExpertise" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border">
            <option value="Student Tutoring Services">Student Tutoring Services</option>
            <option value="Medical Advice">Medical Advice</option>
            <option value="IT Career Guidance">IT Career Guidance</option>
            <option value="Legal Advice">Legal Advice</option>
            <option value="HR Services">HR Services</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Years of Experience</label>
          <input formControlName="yearsExperience" type="number" min="0" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>

        <div class="flex space-x-4">
          <div class="w-1/3">
            <label class="block text-sm font-medium text-gray-700">Currency</label>
            <select formControlName="currency" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border">
              <option value="INR">INR (₹)</option>
              <option value="USD">USD ($)</option>
            </select>
          </div>
          <div class="w-2/3">
            <label class="block text-sm font-medium text-gray-700">Price Per Hour</label>
            <input formControlName="pricePerHour" type="number" min="0" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>

      </div>

      <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">
        {{ errorMessage }}
      </div>

      <div>
        <button type="submit" [disabled]="registerForm.invalid" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
          Complete Registration
        </button>
      </div>
      
      <div class="text-center">
        <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-500 text-sm">
          Already an Expert? Log in here.
        </a>
      </div>
    </form>
  </div>
</div>
