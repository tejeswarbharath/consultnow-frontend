<div class="container mx-auto p-4">
  <div *ngIf="loading" class="text-center">
    <span class="loading loading-lg"></span>
  </div>

  <div *ngIf="error" class="alert alert-error">
    <span>{{ error }}</span>
  </div>

  <div *ngIf="expert && !loading" class="max-w-4xl mx-auto">
    <div class="card lg:card-side bg-base-100 shadow-xl">
      <figure class="p-4">
        <img [src]="expert.photoUrl || 'https://via.placeholder.com/150'" alt="Expert Photo" class="rounded-xl w-48 h-48 object-cover">
      </figure>
      <div class="card-body">
        <h2 class="card-title text-3xl">{{ expert.name }}</h2>
        <p class="text-lg text-gray-600">{{ expert.category?.name }}</p>
        <div class="mt-4">
          <p><strong>Experience:</strong> {{ expert.yearsExperience }} years</p>
          <p><strong>Rate:</strong> ${{ expert.pricePerHour }}/hour</p>
          <p><strong>Availability:</strong> <span [ngClass]="{'text-green-500': expert.isAvailable, 'text-red-500': !expert.isAvailable}">{{ expert.isAvailable ? 'Available' : 'Unavailable' }}</span></p>
        </div>
        <div class="mt-4">
          <h3 class="font-bold">Bio:</h3>
          <p class="text-base-content/80">{{ expert.bio || 'No bio provided.' }}</p>
        </div>
      </div>
    </div>

    <!-- AI Marketing Tool Integration -->
    <app-expert-marketing-tool [expert]="expert"></app-expert-marketing-tool>
  </div>
</div>
