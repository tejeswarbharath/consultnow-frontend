<!-- Floating Chat Widget -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
  
  <!-- Chat Window -->
  <div *ngIf="isOpen" class="bg-white rounded-lg shadow-xl w-80 mb-4 overflow-hidden border border-gray-200 flex flex-col h-96">
    
    <!-- Header -->
    <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
      <h3 class="font-semibold">AI Support</h3>
      <button (click)="toggleChat()" class="text-white hover:text-gray-200 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="flex-1 p-4 overflow-y-auto bg-gray-50 flex flex-col gap-3">
      <div *ngFor="let msg of messages" 
           [ngClass]="msg.sender === 'user' ? 'self-end bg-blue-100 text-blue-900' : 'self-start bg-white border text-gray-800'"
           class="rounded-lg p-3 max-w-[80%] text-sm shadow-sm">
        {{ msg.text }}
      </div>
      
      <!-- Loading Indicator -->
      <div *ngIf="isLoading" class="self-start bg-white border text-gray-800 rounded-lg p-3 text-sm shadow-sm flex items-center gap-2">
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 bg-white border-t border-gray-200 flex gap-2">
      <input type="text" 
             [(ngModel)]="userInput" 
             (keyup.enter)="sendMessage()"
             [disabled]="isLoading"
             placeholder="Type your problem..." 
             class="flex-1 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      <button (click)="sendMessage()" 
              [disabled]="isLoading || !userInput.trim()"
              class="bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 disabled:opacity-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Toggle Button -->
  <button *ngIf="!isOpen" (click)="toggleChat()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full p-4 shadow-lg focus:outline-none transition-transform transform hover:scale-105">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  </button>
</div>
